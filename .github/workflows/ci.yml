# .github/workflows/ci.yml
name: Tests NTT Kyber

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test:
    name: Tests sur ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        
    steps:
    - name: 📥 Checkout du code
      uses: actions/checkout@v4
      
    - name: 🔧 Installation GCC (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make
        
    - name: 🔧 Installation GCC (macOS)
      if: runner.os == 'macOS'
      run: brew install gcc make
        
    - name: ℹ️ Informations système
      run: |
        echo "=== Informations compilateur ==="
        gcc --version
        make --version
        echo "=== Structure du projet ==="
        ls -la
        
    - name: 🏗️ Compilation du projet
      run: make
      
    - name: 🧪 Tests rapides (100 essais)
      run: make test-quick
      
    - name: 🚀 Tests complets (1000 essais)
      run: |
        make clean
        make test-full
        
    - name: 📊 Résumé des tests
      if: always()
      run: |
        echo "### 🧪 Résultats des tests NTT" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Plateforme:** ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
        echo "**Compilateur:** $(gcc --version | head -n1)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f test_ntt ]; then
          echo "✅ Compilation réussie" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests exécutés avec succès" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Erreur de compilation" >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: 🧹 Nettoyage
      if: always()
      run: make clean