# .github/workflows/ci.yml
name: Tests NTT Kyber

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test:
    name: Tests NTT
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout du code
      uses: actions/checkout@v4
      
    - name: 🔧 Installation des dépendances
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential
        
    - name: ℹ️ Informations système
      run: |
        echo "=== Compilateur ==="
        gcc --version
        echo "=== Make ==="
        make --version
        echo "=== Structure du projet ==="
        ls -la
        echo "=== Contenu src/ ==="
        ls -la src/
        echo "=== Contenu include/ ==="
        ls -la include/
        echo "=== Contenu tests/ ==="
        ls -la tests/
        
    - name: 🏗️ Compilation du projet
      run: make
      
    - name: 🧪 Tests rapides (100 essais)
      run: make test-quick
      
    - name: 🚀 Tests complets (1000 essais)
      run: make test-full
        
    - name: 📊 Résumé des tests
      if: always()
      run: |
        echo "### 🧪 Résultats des tests NTT" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Plateforme:** ubuntu-latest" >> $GITHUB_STEP_SUMMARY
        echo "**Compilateur:** $(gcc --version | head -n1)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f test_ntt ]; then
          echo "✅ Compilation réussie" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests exécutés avec succès" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Erreur de compilation" >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: 🧹 Nettoyage
      if: always()
      run: make clean